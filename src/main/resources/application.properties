# === GROQ OpenAI 호환 ===
embabel.agent.platform.models.openai.custom.api-key=${GROQ_API_KEY:your-dev-key}
embabel.agent.platform.models.openai.custom.base-url=${GROQ_BASE_URL:https://api.groq.com/openai/v1}
embabel.agent.platform.models.openai.custom.models=qwen/qwen3-32b,openai/gpt-oss-20b,openai/gpt-oss-120b,llama-3.1-8b-instant,llama-3.3-70b-versatile

# === GEMINI OpenAI 호환 ===
embabel.agent.platform.models.gemini.api-key=${GEMINI_API_KEY:your-dev-key}
embabel.agent.platform.models.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/openai/}

# ==========
# = Global =
# ==========

# Ranking Agent
# embabel.agent.platform.ranking.llm=

# Global LLM Operations Settings
embabel.agent.platform.llm-operations.timeout-seconds=300
embabel.agent.platform.llm-operations.data-binding.max-attempts=15

# Presentation Output Configuration
presentation.output.dir=output/slides
presentation.merged.file.path=/Users/jwlee/Documents/obsidian/+Encounters/presentation_test.md

# RAG Configuration
embabel.agent.rag.lucene.dir=target/lucene-index
embabel.agent.rag.import.dir=knowledge

# OpenAI 호환 회복성
embabel.agent.platform.models.openai.max-attempts=30
embabel.agent.platform.models.openai.backoff-millis=6000
embabel.agent.platform.models.openai.backoff-multiplier=1.5
embabel.agent.platform.models.openai.backoff-max-interval=180000

