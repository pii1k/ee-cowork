<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">
    <div th:replace="~{fragments/layout :: nav}"></div>
    
    <div class="container">
        <div class="mb-4 d-flex justify-content-between align-items-center">
            <h2 th:text="${report.title}">Weekly Report</h2>
            <div>
                <a href="/" class="btn btn-secondary">Back to List</a>
                <a th:href="@{/reports/{id}/download(id=${report.id})}" class="btn btn-success">Download HTML</a>
            </div>
        </div>

        <div class="card shadow-sm mb-4">
            <div class="card-body p-5">
                <div class="report-content" th:utext="${report.content}">
                    <!-- AI Generated Content -->
                </div>
            </div>
        </div>
    </div>
</body>
</html>
