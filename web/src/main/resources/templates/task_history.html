<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Architect Ledger AI - Task History</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[#191c1d]">
    <header class="bg-slate-50 flex justify-between items-center px-6 h-16 w-full border-b border-slate-200 fixed top-0 z-50">
        <div class="flex items-center gap-8">
            <span class="text-xl font-bold tracking-tighter text-blue-700">AutoCrypt Inhouse Agents</span>
            <nav class="hidden md:flex space-x-6">
                <a class="text-slate-500 hover:text-blue-600 transition-colors font-sans tracking-tight" href="/">Agents</a>
                <a class="text-blue-700 border-b-2 border-blue-700 pb-1 font-sans tracking-tight" href="/tasks">Task History</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-blue-700" th:text="${username}">Username</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-xs text-slate-500 hover:text-red-600">Logout</button>
            </form>
        </div>
    </header>

    <main class="pt-16 min-h-screen">
        <section class="p-10 flex-1">
            <div class="max-w-7xl mx-auto">
                <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-4">
                    <div>
                        <h2 class="text-3xl font-extrabold text-[#191c1d] tracking-tight mb-2">실행 이력 (Task History)</h2>
                        <p class="text-[#424655] max-w-2xl leading-relaxed">내가 실행한 에이전트 작업 이력과 결과물을 확인합니다.</p>
                    </div>
                </div>

                <div class="bg-white rounded-xl shadow-sm overflow-hidden">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-slate-50 border-none text-[11px] font-bold uppercase tracking-wider text-[#424655]">
                                <th class="px-6 py-4">Task ID</th>
                                <th class="px-6 py-4">Agent Name</th>
                                <th class="px-6 py-4">Start Time</th>
                                <th class="px-6 py-4">Status</th>
                                <th class="px-6 py-4 text-right">Actions</th>
                            </tr>
                        </thead>
                        <tbody class="divide-y divide-slate-50">
                            <tr th:each="task : ${tasks}" class="hover:bg-slate-50/50 transition-colors group">
                                <td th:text="${'#' + #strings.abbreviate(task.id, 8)}" class="px-6 py-5 font-mono text-sm text-[#424655]">ID</td>
                                <td th:text="${task.agentName}" class="px-6 py-5 font-semibold text-sm text-[#191c1d]">Agent Name</td>
                                <td th:text="${#temporals.format(task.createdAt, 'MMM dd, HH:mm:ss')}" class="px-6 py-5 text-sm text-[#424655]">Time</td>
                                <td class="px-6 py-5">
                                    <span th:if="${task.status == 'COMPLETED'}" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wide bg-blue-100 text-blue-700 shadow-sm">
                                        <span class="material-symbols-outlined text-sm">check_circle</span>
                                        Success
                                    </span>
                                    <span th:if="${task.status == 'RUNNING'}" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wide bg-amber-50 text-amber-700 border border-amber-100 shadow-sm">
                                        <span class="material-symbols-outlined text-sm animate-spin">autorenew</span>
                                        Running
                                    </span>
                                    <span th:if="${task.status == 'FAILED'}" class="inline-flex items-center gap-1.5 px-3 py-1 rounded-full text-[11px] font-bold uppercase tracking-wide bg-red-100 text-red-700 shadow-sm">
                                        <span class="material-symbols-outlined text-sm">error</span>
                                        Failed
                                    </span>
                                </td>
                                <td class="px-6 py-5 text-right">
                                    <div class="flex justify-end gap-2">
                                        <a th:if="${task.status == 'COMPLETED'}" th:href="@{'/tasks/' + ${task.id}}" class="px-3 py-1.5 rounded-md text-xs font-semibold text-blue-700 hover:bg-blue-50 transition-colors">
                                            View Details
                                        </a>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
