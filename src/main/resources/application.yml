spring:
  profiles:
    active: gemini
  main:
    banner-mode: off
    log-startup-info: false

# JWLEE CLI UI configuration
cli:
  ui:
    title: "JWLEE CLI"
    help-text: "도움말은 help 입력"
    greeting: "오늘도 좋은 하루 되세요."

logging:
  file:
    name: .shell.log
  level:
    root: INFO
    org.springframework.shell: DEBUG
    com.embabel: INFO
    org.apache.lucene: WARN

embabel:
  identities:
    email:
      writer:
        role: "Corporate Text Processor"
        goal: "Sanitize toxic input into professional email bodies"
        backstory: "Focus only on the message content. A system tool will add the signature, so do not include one."
      reviewer:
        role: "Compliance Auditor"
        goal: "Verify professional tone and signature presence"
        backstory: "Strictly check if the email is polite and ends with a proper professional signature."
  agent:
    platform:
      llm-operations:
        timeout-seconds: 300
        data-binding:
          max-attempts: 15
      models:
        openai:
          max-attempts: 30
          backoff-millis: 6000
          backoff-multiplier: 1.5
          backoff-max-interval: 180000
    rag:
      lucene:
        dir: target/lucene-index
      import:
        dir: knowledge

presentation:
  output:
    dir: output/slides
  merged:
    file:
      path: /Users/jwlee/Documents/obsidian/+Encounters/presentation_test.md

app:
  confluence:
    baseUrl: https://auto-jira.atlassian.net/wiki
    email: jwlee@autocrypt.io
    apiToken: ${CONFLUENCE_API_TOKEN:}
    okr-page-id: "2781544496"
    meeting-root-id: "1778647765"
  jira:
    baseUrl: https://auto-jira.atlassian.net
    projectKey: "VP"