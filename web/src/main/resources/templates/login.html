<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" class="light" lang="ko">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AutoCrypt Inhouse Agents - Login</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bg-primary-gradient {
            background: linear-gradient(135deg, #0057cd 0%, #0d6efd 100%);
        }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[#191c1d] min-h-screen">
    <div class="flex min-h-screen w-full flex-col md:flex-row">
        <!-- Left Column: Branding -->
        <div class="relative hidden md:flex md:w-5/12 lg:w-4/12 flex-col justify-between p-12 bg-slate-100 overflow-hidden">
            <div class="relative z-10">
                <div class="flex items-center gap-2 mb-16">
                    <span class="material-symbols-outlined text-blue-700 text-3xl" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
                    <h1 class="text-xl font-bold tracking-tighter text-blue-700">AutoCrypt Inhouse Agents</h1>
                </div>
                <div class="space-y-6">
                    <h2 class="text-4xl lg:text-5xl font-extrabold tracking-tight text-[#191c1d] leading-tight word-keep">
                        사내 업무를 위한<br/>맞춤형 AI 에이전트
                    </h2>
                    <p class="text-[#424655] text-lg max-w-sm leading-relaxed word-keep">
                        각 직무에 특화된 AI 모델을 활용하여 반복적인 업무를 자동화하고 생산성을 높이세요. 부서별로 필요한 에이전트를 쉽게 확장할 수 있습니다.
                    </p>
                </div>
            </div>
            <div class="relative z-10">
                <div class="flex items-center gap-4 text-sm font-medium text-slate-500">
                    <span class="w-8 h-px bg-slate-300"></span>
                    <span>v0.0.1 (개별 부서에서 개조하여 사용하세요)</span>
                </div>
            </div>
        </div>

        <!-- Right Column: Login Form -->
        <div class="flex-1 flex items-center justify-center p-6 md:p-12 lg:p-24 bg-white">
            <div class="w-full max-w-md space-y-8" id="login-section">
                <div class="space-y-2">
                    <h3 class="text-2xl font-bold tracking-tight text-[#191c1d]">Login</h3>
                    <p class="text-[#424655] text-sm">계정정보를 입력하여 시스템에 접속하세요.</p>
                </div>
                
                <!-- Error Message -->
                <div th:if="${param.error}" class="p-4 mb-4 text-sm text-red-800 rounded-lg bg-red-50" role="alert">
                    아이디 또는 비밀번호가 올바르지 않습니다.
                </div>

                <form th:action="@{/login}" method="post" class="space-y-6">
                    <div class="space-y-4">
                        <div class="group">
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">ID</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-lg">person</span>
                                <input name="username" class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-md focus:ring-2 focus:ring-blue-600 focus:bg-white transition-all placeholder:text-slate-300" placeholder="user.name" type="text" required/>
                            </div>
                        </div>
                        <div class="group">
                            <label class="block text-xs font-bold uppercase tracking-widest text-slate-500 mb-2 ml-1">PW</label>
                            <div class="relative">
                                <span class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-slate-400 text-lg">lock</span>
                                <input name="password" class="w-full pl-12 pr-4 py-3 bg-slate-50 border-none rounded-md focus:ring-2 focus:ring-blue-600 focus:bg-white transition-all placeholder:text-slate-300" placeholder="••••••••••••" type="password" required/>
                            </div>
                        </div>
                    </div>
                    <button class="w-full py-4 bg-primary-gradient text-white font-semibold rounded-md shadow-lg hover:shadow-xl active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                        <span>로그인 (Login)</span>
                        <span class="material-symbols-outlined text-lg">arrow_forward</span>
                    </button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
