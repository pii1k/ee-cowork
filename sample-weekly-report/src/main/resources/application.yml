spring:
  application:
    name: sample-weekly-report
  datasource:
    url: jdbc:h2:file:./target/weeklydb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
  security:
    user:
      name: jwlee
      password: Auto0302!

server:
  port: 8081

# Embabel Configuration
embabel:
  models:
    default-llm: gemini-2.5-flash-lite
    llms:
      #simple: gemini-2.5-flash-lite
      #normal: gemini-2.5-flash-lite
      #performant: gemini-2.5-flash-lite
      simple: gemini-2.5-flash
      normal: gemini-3-flash-preview
      performant: gemini-3-pro-preview
  agent:
    platform:
      llm-operations:
        timeout-seconds: 300
        data-binding:
          max-attempts: 10
      models:
        googlegenai:
          api-key: ${GEMINI_API_KEY}

  identities:
    weekly-report:
      analyst:
        role: "Research Director / Director"
        goal: "Draft a comprehensive weekly report by analyzing OKRs, team reports, and Jira issues."
        backstory: "You manage a 30-person SW development team. You are meticulous, strategic, and focused on OKR alignment."

# App Specific Config
