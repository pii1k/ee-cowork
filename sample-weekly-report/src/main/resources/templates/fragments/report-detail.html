<div th:fragment="detail" class="report-preview" xmlns:th="http://www.thymeleaf.org">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4 th:text="${report.title}">Report Draft</h4>
        <a th:href="@{/reports/{id}/download(id=${report.id})}" class="btn btn-success btn-sm">Download HTML</a>
    </div>
    <hr>
    <div class="report-content" th:utext="${report.content}">
        <!-- AI Generated Content -->
    </div>
</div>
