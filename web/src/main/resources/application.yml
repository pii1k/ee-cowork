spring:
  profiles:
    active: gemini
  servlet:
    multipart:
      max-file-size: 30MB
      max-request-size: 50MB
  datasource:
    url: jdbc:h2:file:./data/agentdb
    driverClassName: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect
  h2:
    console:
      enabled: true
      path: /h2-console

server:
  port: 8081

logging:
  level:
    root: INFO
    io.autocrypt.jwlee.cowork.web: DEBUG
