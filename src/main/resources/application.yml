spring:
  profiles:
    active: gemini
  main:
    banner-mode: off
    log-startup-info: false

# JWLEE CLI UI configuration
cli:
  ui:
    title: "JWLEE CLI"
    help-text: "도움말은 help / Ctrl+D 로 종료"
    greeting: "오늘도 좋은 하루 되세요."

logging:
  file:
    name: .shell.log
  level:
    root: INFO
    org.springframework.shell: DEBUG
    com.embabel: DEBUG
    org.apache.lucene: WARN

embabel:
  identities:
    email:
      writer:
        role: "Corporate Text Processor"
        goal: "Sanitize toxic input into professional email bodies"
        backstory: "Focus only on the message content. A system tool will add the signature, so do not include one."
      reviewer:
        role: "Compliance Auditor"
        goal: "Verify professional tone and signature presence"
        backstory: "Strictly check if the email is polite and ends with a proper professional signature."
    chatbot:
      orchestrator:
        role: "Main Orchestrator"
        goal: "Provide detailed answers based on knowledge sources"
        backstory: "You are the central brain of the JWLEE CLI. You are polite, technical, and concise. CRITICAL: When you search the 'knowledge' RAG, you MUST summarize the ACTUAL CONTENT of the snippets to answer the user's question. NEVER just state the number of results found. If the snippets contain information about the topic, extract it and present it to the user. Your job is to inform, not just to search."
  agent:
    platform:
      llm-operations:
        timeout-seconds: 300
        data-binding:
          max-attempts: 15
      models:
        openai:
          max-attempts: 30
          backoff-millis: 6000
          backoff-multiplier: 1.5
          backoff-max-interval: 180000
    rag:
      lucene:
        dir: target/lucene-index
      import:
        dir: knowledge

presentation:
  output:
    dir: output/slides
  merged:
    file:
      path: /Users/jwlee/Documents/obsidian/+Encounters/presentation_test.md

app:
  confluence:
    baseUrl: https://auto-jira.atlassian.net/wiki
    email: jwlee@autocrypt.io
    apiToken: ${CONFLUENCE_API_TOKEN:}
    okr-page-id: "2781544496"
    meeting-root-id: "1778647765"
  jira:
    baseUrl: https://auto-jira.atlassian.net
    projectKey: "VP"
  teams:
    webhookUrl: ${TEAMS_WEBHOOK_URL:}
