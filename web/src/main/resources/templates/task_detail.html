<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>AutoCrypt Inhouse Agents - Task Detail</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <style>
        body { font-family: 'Inter', sans-serif; }
        /* Markdown Rendering Styles */
        .markdown-content h1 { font-size: 2.25rem; font-weight: 800; margin-top: 1.5rem; margin-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; padding-bottom: 0.5rem; color: #0f172a; tracking-tight: -0.025em; }
        .markdown-content h2 { font-size: 1.75rem; font-weight: 700; margin-top: 2.5rem; margin-bottom: 1rem; color: #1e293b; }
        .markdown-content h3 { font-size: 1.25rem; font-weight: 600; margin-top: 2rem; margin-bottom: 0.75rem; color: #334155; }
        .markdown-content p { margin-bottom: 1.25rem; line-height: 1.75; color: #334155; }
        .markdown-content ul { list-style-type: disc; padding-left: 1.75rem; margin-bottom: 1.25rem; color: #334155; }
        .markdown-content ol { list-style-type: decimal; padding-left: 1.75rem; margin-bottom: 1.25rem; color: #334155; }
        .markdown-content li { margin-bottom: 0.5rem; line-height: 1.6; }
        .markdown-content li p { margin-bottom: 0.25rem; }
        .markdown-content hr { margin: 3rem 0; border: 0; border-top: 1px solid #e2e8f0; }
        .markdown-content pre { background-color: #f8fafc; padding: 1.25rem; border-radius: 0.5rem; overflow-x: auto; margin-bottom: 1.5rem; border: 1px solid #e2e8f0; box-shadow: inset 0 2px 4px 0 rgb(0 0 0 / 0.02); }
        .markdown-content code { background-color: #f1f5f9; padding: 0.2rem 0.4rem; border-radius: 0.25rem; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 0.875em; color: #0f172a; }
        .markdown-content pre code { background-color: transparent; padding: 0; color: #334155; }
        .markdown-content blockquote { border-left: 4px solid #cbd5e1; padding-left: 1rem; color: #64748b; font-style: italic; margin-bottom: 1.5rem; background-color: #f8fafc; padding: 1rem; border-radius: 0 0.5rem 0.5rem 0; }
        .markdown-content a { color: #2563eb; text-decoration: none; }
        .markdown-content a:hover { text-decoration: underline; color: #1d4ed8; }
        .markdown-content table { width: 100%; border-collapse: collapse; margin-bottom: 1.5rem; }
        .markdown-content th, .markdown-content td { border: 1px solid #e2e8f0; padding: 0.75rem; text-align: left; }
        .markdown-content th { background-color: #f8fafc; font-weight: 600; color: #1e293b; }
    </style>
</head>
<body class="bg-[#f8f9fa] text-[#191c1d]">
    <header class="bg-slate-50 flex justify-between items-center px-6 h-16 w-full border-b border-slate-200 fixed top-0 z-50">
        <div class="flex items-center gap-8">
            <span class="text-xl font-bold tracking-tighter text-blue-700">AutoCrypt Inhouse Agents</span>
            <nav class="hidden md:flex space-x-6">
                <a class="text-slate-500 hover:text-blue-600 transition-colors" href="/">Agents</a>
                <a class="text-slate-500 hover:text-blue-600 transition-colors" href="/tasks">Task History</a>
            </nav>
        </div>
        <div class="flex items-center gap-4">
            <span class="text-sm font-medium text-blue-700" th:text="${username}">Username</span>
            <form th:action="@{/logout}" method="post">
                <button type="submit" class="text-xs text-slate-500 hover:text-red-600">Logout</button>
            </form>
        </div>
    </header>

    <main class="pt-16 min-h-screen">
        <div class="max-w-4xl mx-auto p-10">
            <div class="mb-8 flex justify-between items-center">
                <div>
                    <h2 class="text-3xl font-extrabold text-[#191c1d]" th:text="${task.agentName}">Agent Name</h2>
                    <p class="text-slate-500 text-sm" th:text="${'Task ID: ' + task.id}">Task ID</p>
                </div>
                <a href="/tasks" class="text-blue-700 hover:underline flex items-center gap-2 font-semibold">
                    <span class="material-symbols-outlined">arrow_back</span>
                    Back to History
                </a>
            </div>

            <div class="bg-white rounded-xl shadow-sm border border-slate-100 p-10">
                <!-- Hidden raw markdown content -->
                <textarea id="raw-markdown" th:utext="${task.result}" style="display: none;"></textarea>
                <!-- Container for rendered HTML -->
                <div id="rendered-content" class="markdown-content"></div>
            </div>
            
            <div class="mt-8 flex justify-end gap-4">
                <!-- Slide Viewer Button (Only for reveal-slides) -->
                <a th:if="${task.agentId == 'reveal-slides'}" th:href="@{/tasks/{id}/view(id=${task.id})}" target="_blank" class="bg-indigo-600 text-white px-6 py-2 rounded-md font-bold shadow-md hover:bg-indigo-700 transition-colors flex items-center gap-2">
                    <span class="material-symbols-outlined">present_to_all</span>
                    View Online (Slides)
                </a>

                <button onclick="downloadMarkdown()" class="bg-blue-700 text-white px-6 py-2 rounded-md font-bold shadow-md hover:bg-blue-800 transition-colors flex items-center gap-2">
                    <span class="material-symbols-outlined">download</span>
                    Download .MD
                </button>
            </div>
        </div>
    </main>

    <script>
        function cleanMarkdown(text) {
            if (!text) return "";
            // 정규식을 사용하여 앞뒤의 ```markdown 또는 ``` 및 공백을 모두 제거
            return text.replace(/^```[a-zA-Z]*\s*\n/g, '').replace(/\n\s*```$/g, '').trim();
        }

        document.addEventListener("DOMContentLoaded", function() {
            const rawTextArea = document.getElementById("raw-markdown");
            if (rawTextArea && window.marked) {
                let cleanedContent = cleanMarkdown(rawTextArea.value);
                // Remove reveal.js specific slide comments for clean regular markdown preview
                cleanedContent = cleanedContent.replace(/<!--\s*\.slide:[\s\S]*?-->/g, '');
                
                if (cleanedContent) {
                    marked.setOptions({
                        breaks: true,
                        gfm: true
                    });
                    document.getElementById("rendered-content").innerHTML = marked.parse(cleanedContent);
                }
            }
        });

        function downloadMarkdown() {
            const rawContent = document.getElementById("raw-markdown").value;
            const cleanedContent = cleanMarkdown(rawContent);
            const agentName = document.querySelector('h2.text-3xl').innerText;
            const dateStr = new Date().toISOString().slice(0, 10);
            const fileName = `${agentName.replace(/\s+/g, '_')}_${dateStr}.md`;

            const blob = new Blob([cleanedContent], { type: 'text/markdown;charset=utf-8;' });
            const link = document.createElement("a");
            const url = URL.createObjectURL(blob);
            
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
    </script>
</body>
</html>
